---
name: Pull Request CI
permissions:
  contents: read
"on":
  pull_request:
    branches:
    - main
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref }}"
  cancel-in-progress: true
jobs:
  detect:
    runs-on: action-runner-image-runners
    name: Detect changed images
    outputs:
      images: "${{ steps.filter.outputs.changes }}"
    steps:
    - name: Checkout Git repository
      uses: actions/checkout@v4
    - name: Detect changed image directories
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          bankwiz_server: bankwiz_server/**
  build:
    needs: detect
    if: "needs.detect.outputs.images != '[]'"
    runs-on: action-runner-image-runners
    name: "Build ${{ matrix.image }} (no push)"
    strategy:
      fail-fast: false
      matrix:
        image: "${{ fromJson(needs.detect.outputs.images) }}"
    steps:
    - name: Checkout Git repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build
      uses: docker/build-push-action@v7
      with:
        context: "${{ matrix.image }}"
        file: "${{ matrix.image }}/Dockerfile"
        platforms: linux/amd64,linux/arm64
        push: false
