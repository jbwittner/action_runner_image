---
name: Main branch CI
permissions:
  contents: read
"on":
  push:
    branches:
    - main
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref }}"
  cancel-in-progress: true
jobs:
  detect:
    runs-on: ubuntu-latest
    name: Detect changed images
    outputs:
      images: "${{ steps.filter.outputs.changes }}"
    steps:
    - name: Checkout Git repository
      uses: actions/checkout@v4
    - name: Detect changed image directories
      id: filter
      uses: dorny/paths-filter@v3
      with:
        filters: |
          bankwiz_server: bankwiz_server/**
  build_push_docker:
    needs: detect
    if: "needs.detect.outputs.images != '[]'"
    runs-on: ubuntu-latest
    name: "Build and push ${{ matrix.image }}"
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: "${{ fromJson(needs.detect.outputs.images) }}"
    steps:
    - name: Checkout Git repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: "${{ github.actor }}"
        password: "${{ secrets.GITHUB_TOKEN }}"
    - name: Build
      uses: docker/build-push-action@v6
      with:
        context: "${{ matrix.image }}"
        file: "${{ matrix.image }}/Dockerfile"
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/jbwittner/action_runner_image/${{ matrix.image }}:main-latest
          ghcr.io/jbwittner/action_runner_image/${{ matrix.image }}:main-${{ github.sha }}
